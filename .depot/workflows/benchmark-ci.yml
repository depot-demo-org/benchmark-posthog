name: CI Benchmark

on:
  push: {}
  workflow_dispatch: {}

defaults:
  run:
    working-directory: upstream

jobs:
  setup:
    name: setup
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: posthog-benchmark-ci
      version: v1.2
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          clean: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13.13

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check uv and Python version compatibility
        shell: bash
        run: |
          python3 bin/check_uv_python_compatibility.py

      - name: Download GeoIP database
        shell: bash
        run: |
          ./bin/download-mmdb

      - name: Install SAML dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install libxml2-dev libxmlsec1 libxmlsec1-dev libxmlsec1-openssl

      - name: Install Python dependencies
        shell: bash
        run: |
          UV_PROJECT_ENVIRONMENT=$pythonLocation uv sync --frozen --dev

  benchmark:
    name: benchmark
    needs: setup
    runs-on:
      size: 4x16
      image: posthog-benchmark-ci
    timeout-minutes: 30
    env:
      LD_LIBRARY_PATH: /home/runner/work/tmp/tool_cache/Python/3.13.13/x64/lib:${{ env.LD_LIBRARY_PATH }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          clean: false

      - parallel:
          - name: ruff check
            run: ruff check .
          - name: ruff format check
            run: ruff format --check --diff .
          - name: ty check
            shell: bash
            run: |
              echo "Feedback welcome in #team-devex"
              uv run ty check
          - name: mypy
            shell: bash -e {0}
            env:
              MYPY_NUM_WORKERS: 2
            run: |
              mypy --version && mypy --cache-fine-grained --disable-error-code unused-ignore .
          - name: Check if schema.py is up to date
            shell: bash
            run: |
              npm run schema:build:python && git diff --exit-code
          - name: Check hogli manifest completeness
            run: ./bin/hogli meta:check
          - name: Run hogli framework tests
            shell: bash
            run: pytest tools/hogli/tests -v --junitxml=junit-hogli.xml
          - name: Run hogli extension tests
            shell: bash
            run: pytest tools/hogli-commands/hogli_commands/tests -v --junitxml=junit-hogli-commands.xml
          - name: Run query-performance-ai tests
            shell: bash
            run: pytest tools/query-performance-ai/query_performance_ai -v --junitxml=junit-query-performance-ai.xml
          - name: Run pr-approval-agent (stamphog) tests
            shell: bash
            run: pytest tools/pr-approval-agent -v --junitxml=junit-pr-approval-agent.xml
          - name: Run dependency detection script tests
            shell: bash
            run: pytest bin/test/test_find_python_dependencies.py -v --junitxml=junit-dependency-detection.xml
