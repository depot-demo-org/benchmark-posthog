name: CI Benchmark

on:
  push: {}
  workflow_dispatch: {}

defaults:
  run:
    working-directory: upstream

jobs:
  benchmark:
    name: benchmark
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.12

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
          version: 0.10.2

      - name: Install SAML dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libxml2-dev libxmlsec1 libxmlsec1-dev libxmlsec1-openssl

      - name: Install Python dependencies
        run: |
          UV_PROJECT_ENVIRONMENT=$pythonLocation uv sync --frozen --dev

      - parallel:
          - name: ruff check
            run: ruff check .
          - name: ruff format check
            run: ruff format --check --diff .
          - name: ty check
            continue-on-error: true
            run: ./bin/ty.py check posthog ee common dags
          - name: mypy
            shell: bash -e {0}
            run: |
              mypy --version && mypy --cache-fine-grained . | mypy-baseline filter --allow-unsynced || (echo "run 'pnpm run mypy-baseline-sync' to update the baseline" && exit 1)
          - name: Check hogli manifest
            run: ./bin/hogli meta:check
          - name: Run hogli tests
            run: pytest common/hogli/tests/ -v
          - name: Run dependency detection tests
            run: pytest bin/test/test_find_python_dependencies.py -v
